<div class="page-container">
  <app-page-header title="Articles" subtitle="News, blogs and long-form content">
    <button mat-stroked-button (click)="manageCategories()">
      <mat-icon>category</mat-icon>
      Categories
    </button>
    @if (canWrite) {
      <button mat-flat-button color="primary" (click)="create()">
        <mat-icon>add</mat-icon>
        New article
      </button>
    }
  </app-page-header>

  @if (!loading() && rows().length === 0) {
    <app-empty-state icon="article" message="No articles yet" hint="Write your first article." />
  } @else {
    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [actions]="actions"
      (action)="onAction($event)"
    ></app-data-table>
    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPage($event)"
    ></mat-paginator>
  }

</div>
