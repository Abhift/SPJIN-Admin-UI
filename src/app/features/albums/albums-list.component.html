<div class="page-container">
  <app-page-header title="Albums" subtitle="Photo galleries">
    @if (canWrite) {
      <button mat-flat-button color="primary" (click)="create()">
        <mat-icon>add</mat-icon>
        New album
      </button>
    }
  </app-page-header>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  } @else if (rows().length === 0) {
    <app-empty-state icon="photo_library" message="No albums yet" hint="Create your first album." />
  } @else {
    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [actions]="actions"
      (action)="onAction($event)"
    ></app-data-table>
    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPage($event)"
    ></mat-paginator>
  }

</div>
