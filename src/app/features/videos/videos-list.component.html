<div class="page-container">
  <app-page-header title="Videos" subtitle="Video gallery">
    @if (canWrite) {
      <button mat-flat-button color="primary" (click)="create()">
        <mat-icon>add</mat-icon>
        New video
      </button>
    }
    <mat-form-field appearance="outline" subscriptSizing="dynamic" style="width:155px;">
      <mat-icon matPrefix style="font-size:18px;width:18px;height:18px;margin-right:6px;opacity:.6;">translate</mat-icon>
      <mat-select [value]="selectedLang()" (selectionChange)="selectedLang.set($event.value)">
        @for (opt of langOptions; track opt.value) {
          <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </app-page-header>

  @if (!loading() && rows().length === 0) {
    <app-empty-state icon="smart_display" message="No videos yet" hint="Add your first video." />
  } @else {
    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [actions]="actions"
      (action)="onAction($event)"
    ></app-data-table>
    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPage($event)"
    ></mat-paginator>
  }
</div>
