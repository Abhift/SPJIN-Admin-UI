<div class="page-container">
  <app-page-header title="Quotes" subtitle="Inspirational quotes shown across the site">
    @if (canWrite) {
      <button mat-flat-button color="primary" (click)="create()">
        <mat-icon>add</mat-icon>
        New quote
      </button>
    }
  </app-page-header>

  @if (!loading() && rows().length === 0) {
    <app-empty-state icon="format_quote" message="No quotes yet" hint="Add your first quote." />
  } @else {
    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [actions]="actions"
      (action)="onAction($event)"
    ></app-data-table>
    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPage($event)"
    ></mat-paginator>
  }

</div>
