<div class="localized-input">
  <div class="lang-bar">
    <span class="field-label">{{ label }}@if (required) {<span class="req">&nbsp;*</span>}</span>
    <mat-button-toggle-group
      [value]="lang()"
      (change)="switchLang($event.value)"
      [hideSingleSelectionIndicator]="true"
      aria-label="Language"
    >
      <mat-button-toggle value="en">EN</mat-button-toggle>
      <mat-button-toggle value="hi">हिं</mat-button-toggle>
    </mat-button-toggle-group>
  </div>

  <mat-form-field class="full-width" appearance="outline">
    @if (multiline) {
      <textarea
        matInput
        [rows]="rows"
        [ngModel]="current()"
        (ngModelChange)="update($event)"
        (blur)="blur()"
        [disabled]="disabled"
        [placeholder]="lang() === 'en' ? 'English' : 'Hindi'"
      ></textarea>
    } @else {
      <input
        matInput
        [ngModel]="current()"
        (ngModelChange)="update($event)"
        (blur)="blur()"
        [disabled]="disabled"
        [placeholder]="lang() === 'en' ? 'English' : 'Hindi'"
      />
    }
    @if (hint) {
      <mat-hint>{{ hint }}</mat-hint>
    }
  </mat-form-field>
</div>
