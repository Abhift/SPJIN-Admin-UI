<div class="localized-input">
  @if (label) {
    <span class="field-label">{{ label }}@if (required) {<span class="req">&nbsp;*</span>}</span>
  }

  <mat-form-field class="full-width" appearance="outline">
    @if (multiline) {
      <textarea
        matInput
        [rows]="rows"
        [ngModel]="current()"
        [errorStateMatcher]="errorMatcher"
        (ngModelChange)="update($event)"
        (blur)="blur()"
        [disabled]="disabled"
        [placeholder]="langPlaceholder()"
      ></textarea>
    } @else {
      <input
        matInput
        [ngModel]="current()"
        [errorStateMatcher]="errorMatcher"
        (ngModelChange)="update($event)"
        (blur)="blur()"
        [disabled]="disabled"
        [placeholder]="langPlaceholder()"
      />
    }
    @if (hint) {
      <mat-hint>{{ hint }}</mat-hint>
    }
    @if (ctrl?.invalid && ctrl?.touched) {
      <mat-error>{{ label }} (English) is required</mat-error>
    }
  </mat-form-field>
</div>
