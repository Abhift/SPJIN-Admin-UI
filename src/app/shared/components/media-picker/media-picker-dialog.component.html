<h2 mat-dialog-title>Media library</h2>

@if (uploading() || loading()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}

<mat-dialog-content>
  <div class="toolbar">
    <button mat-stroked-button (click)="fileInput.click()" [disabled]="uploading()">
      <mat-icon>upload</mat-icon>
      Upload new
    </button>
    <input #fileInput type="file" hidden (change)="onFile($event)" />
  </div>

  @if (!loading() && assets().length === 0) {
    <app-empty-state icon="image" message="No media yet" hint="Upload a file to get started." />
  } @else {
    <div class="grid">
      @for (asset of assets(); track asset.id) {
        <button
          type="button"
          class="tile"
          [class.selected]="asset.id === selectedId()"
          (click)="select(asset)"
          (dblclick)="confirm()"
        >
          @if (isImage(asset)) {
            <img [src]="asset.url" [alt]="asset.fileName" loading="lazy" />
          } @else {
            <div class="file-icon"><mat-icon>description</mat-icon></div>
          }
          <span class="name" [title]="asset.fileName">{{ asset.fileName }}</span>
        </button>
      }
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" [disabled]="!selectedId()" (click)="confirm()">
    Select
  </button>
</mat-dialog-actions>
