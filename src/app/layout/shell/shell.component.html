<mat-sidenav-container class="shell">
  <mat-sidenav
    #sidenav
    class="sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="opened()"
    (closedStart)="opened.set(false)"
  >
    <div class="brand">
      <span class="brand-mark">SP</span>
      <span class="brand-name">SPJIN&nbsp;CMS</span>
    </div>

    <mat-nav-list>
      @for (section of sections(); track section.heading) {
        <h3 matSubheader>{{ section.heading }}</h3>
        @for (item of section.items; track item.route) {
          <a
            mat-list-item
            [routerLink]="item.route"
            routerLinkActive
            #rla="routerLinkActive"
            [activated]="rla.isActive"
            (click)="closeOnHandset()"
          >
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
            <span matListItemTitle>{{ item.label }}</span>
          </a>
        }
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="topbar">
      <button mat-icon-button (click)="toggle()" aria-label="Toggle navigation">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="spacer"></span>

      <button mat-button [matMenuTriggerFor]="userMenu" class="user-button">
        <span class="avatar">{{ initials() }}</span>
        <span class="user-email">{{ user()?.email }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="menu-user">
          <strong>{{ user()?.email }}</strong>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign out</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    @if (isLoading()) {
      <mat-progress-bar class="top-progress" mode="indeterminate"></mat-progress-bar>
    }

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
